---
layout: default
---

<article class="post">
  <div class="container content-narrow">
    <p class="eyebrow">
      {{ page.date | date: "%d %b %Y" }} {% if page.categories %} · {{
      page.categories | first }} {% endif %}
    </p>

    <h1>{{ page.title }}</h1>

    <div class="post-content">{{ content }}</div>

    <hr />

    <section class="response-cta">
      <h2>Want to respond?</h2>
      <p>
        You can send me a note if something here made you think, disagree, or
        see something differently.
      </p>
      <p><a href="{{ '/contact/' | relative_url }}">Contact me</a></p>
    </section>
  </div>
</article>
