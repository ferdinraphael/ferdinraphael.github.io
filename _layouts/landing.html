---
layout: default
---

<section class="hero">
  <div class="container hero-copy hero-copy--standalone">
    {% if page.eyebrow %}
    <p class="eyebrow">{{ page.eyebrow }}</p>
    {% endif %}

    <h1>{{ page.hero_title | default: page.title }}</h1>

    {% if page.hero_subtitle %}
    <p class="hero-subtitle">{{ page.hero_subtitle }}</p>
    {% endif %}
  </div>
</section>

{{ content }}
